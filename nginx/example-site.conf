# External TLS terminates here. The Webstack container itself speaks plain HTTP.

upstream example_webstack {
    server 10.10.10.1:18081;
    keepalive 16;
}

server {
    listen 80;
    server_name example.domain.tld;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name example.domain.tld;

    ssl_certificate     /etc/letsencrypt/live/example.domain.tld/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.domain.tld/privkey.pem;

    location / {
        proxy_pass http://example_webstack;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

